<div class="search-bar">
    <input class="searchInput" type="text" placeholder="Search orders...">
    <button class="btn">Search</button>
</div>
<table class="table">
    <thead>
        <tr>
            <!-- table display must match database table schema!!!!! -->
            <th>Vendor ID</th>
            <th>Vendor Name</th>
            <th>Vendor Address</th>
            <th>Vendor Phone</th>
            <th>Production Flag</th>
            <th>Vendor Email</th>
        </tr>
    </thead>
    <tbody>
        {% for vendor in vendors %}
        <tr>
            <td>{{ vendor.vend_id }}</td>
            <td>{{ vendor.vend_name }}</td>
            <td>{{ vendor.vend_address }}</td>
            <td>{{ vendor.vend_phone }}</td>
            <td>{{ vendor.vend_email }}</td>
        </tr>
        {% else %}
        <tr>
            <td colspan="5">No vendors found.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>



<div class="modifyButtons">
    <button class="btn">Create New Entry</button>
    <button class="btn">Update Entry</button>
    <button class="btn">Delete Entry</button>
</div>
