<div class="search-bar">
    <input class="searchInput" type="text" placeholder="Search orders...">
    <button class="btn">Search</button>
</div>
<table>
    <thead>
        <tr>
            <th>Material ID</th>
            <th>Material Name</th>
            <th>Quantity</th>
        </tr>
    </thead>
    <tbody>
        {% for item in inventory %}
        <tr>
            <td>{{ item.raw_mat_id }}</td>
            <td>{{ item.raw_mat_name }}</td>
            <td>{{ item.raw_mat_quantity }}</td>
        </tr>
        {% endfor %}
        {% if not inventory %}
        <tr>
            <td colspan="3">No inventory data found.</td>
        </tr>
        {% endif %}
    </tbody>
</table>
<div class="modifyButtons">
    <button class="btn">Create New Entry</button>
    <button class="btn">Update Entry</button>
    <button class="btn">Delete Entry</button>
</div>
