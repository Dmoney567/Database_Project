<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Supply Chain Database</title>

    <link rel="stylesheet" href="{{ url_for('static', path='css/dashboard.css') }}">
</head>

<body>

<header>
    <div className = "header">
        <h1>Supply Chain Database</h1>
        <nav>
            <a href="/" class = logoutLink>Log Out</a>
        </nav>
    </div>
   
</header>

<main>

    <!-- Tab links -->
    <div class="tab">
    <button class="tablinks" onclick="showData(event, 'Production_orders')">Production Orders</button>
    <button class="tablinks" onclick="showData(event, 'Vendors')">Vendors</button>
    <button class="tablinks" onclick="showData(event, 'Production_report')">Production Report</button>
     <button class="tablinks" onclick="showData(event, 'Inventory')">Inventory</button>
    </div>
       
  
    
    <div id="Production_orders" class="tab-content">
        {% include "components/production_order_table.html" %}
    </div>
    <div id="Vendors" class="tab-content">
        {% include "components/vendor_table.html" %}
    </div>

    <div id="Production_report" class="tab-content">
        {% include "components/production_report_table.html" %}
    </div>

    <div id="Inventory" class="tab-content">
        {% include "components/inventory_table.html" %}
    </div>





</main>


<script>
    function showData(evt, tabName) {
        // Hide all tab content
        document.querySelectorAll('.tab-content').forEach(tab => {
            tab.style.display = 'none';
        });

        // Remove 'active' class from all tab buttons
        document.querySelectorAll('.tablinks').forEach(btn => {
            btn.classList.remove('active');
        });

        // Show the selected tab and mark button as active
        document.getElementById(tabName).style.display = 'block';
        evt.currentTarget.classList.add('active');
    }

    // Open the first tab by default on page load
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelector('.tablinks').click();
    });

    function openUpdateModal(orderId, datePlaced, dateDue, status, productionFlag, vendorId) {
    document.getElementById('modal_order_id').value = orderId;
    document.getElementById('modal_date_placed').value = datePlaced;
    document.getElementById('modal_date_due').value = dateDue;
    document.getElementById('modal_status').value = status;
    document.getElementById('modal_production_flag').value = productionFlag;
    document.getElementById('modal_vendor_id').value = vendorId;

    const modal = document.getElementById('updateModal');
    modal.style.display = 'flex';
}

function closeUpdateModal() {
    document.getElementById('updateModal').style.display = 'none';
}

// Close if user clicks outside the modal box
document.getElementById('updateModal').addEventListener('click', function(e) {
    if (e.target === this) closeUpdateModal();
});
</script>



</body>
</html>
