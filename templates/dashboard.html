<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Supply Chain Database</title>

    <link rel="stylesheet" href="{{ url_for('static', path='css/dashboard.css') }}">
</head>

<body>

<header>
    <h1>Supply Chain Database</h1>
    <nav>
        <a href="/">Home</a>
    </nav>
</header>

<main>

    <!-- Tab links -->
    <div class="tab">
    <button class="tablinks" onclick="openCity(event, 'London')">Production Orders</button>
    <button class="tablinks" onclick="openCity(event, 'Paris')">Vendors</button>
    <button class="tablinks" onclick="openCity(event, 'Tokyo')">Daily Summary</button>
    </div>

    <!-- Tab content -->
    <div id="London" class="tabcontent">
    <h3>Production Orders</h3>
    <p>London is the capital city of England.</p>
    </div>

    <div id="Paris" class="tabcontent">
    <h3>Vendors</h3>
    <p>Paris is the capital of France.</p>
    </div>

    <div id="Tokyo" class="tabcontent">
    <h3>Daily Summary</h3>
    <p>Tokyo is the capital of Japan.</p>
    </div>
    

</main>

<script>
function openCity(evt, cityName) {
  var i, tabcontent, tablinks;
  tabcontent = document.getElementsByClassName("tabcontent");
  for (i = 0; i < tabcontent.length; i++) {
    tabcontent[i].style.display = "none";
  }
  tablinks = document.getElementsByClassName("tablinks");
  for (i = 0; i < tablinks.length; i++) {
    tablinks[i].className = tablinks[i].className.replace(" active", "");
  }
  document.getElementById(cityName).style.display = "block";
  evt.currentTarget.className += " active";
}
</script>


<footer>
    <p>© 2026 Database Project</p>
</footer>

</body>
</html>
